spring:
  application:
    name: bookstore-api
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:bookstoredb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  servlet:
    context-path: /api/v1
  error:
    whitelabel:
      enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:VGhpc0lzQVNlY3VyZUFuZExvbmdFbm91Z2hLZXlGb3JCb29rc3RvcmVBUEk=}
    expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
